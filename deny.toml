# cargo-deny configuration.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Only check dependencies for the default target triple.
targets = ["x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]

[licenses]
# Require every crate to carry an explicit SPDX expression.
version = 2
# Acceptable licenses for all dependencies.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
# Confidence threshold for license text matching (0.0–1.0).
confidence-threshold = 0.8

[bans]
# Deny multiple versions of the same crate to keep the dependency graph lean.
multiple-versions = "warn"
# Deny wildcard dependencies (= "*") in published crates.
wildcards = "deny"
# Deny crates known to be unmaintained or replaced.
deny = []
# Allow specific duplicate versions that are unavoidable today.
# These are transitive deps pulled in by bevy/toml at different versions
# and cannot be resolved without upstream crate updates.
skip = [
  { name = "hashbrown", version = "0.16" },
  { name = "toml_datetime", version = "0.7" },
  { name = "windows-link", version = "0.1" },
  { name = "winnow", version = "0.7" },
]
skip-tree = []

[advisories]
# Deny crates with known security vulnerabilities from the RustSec advisory DB.
version = 2
ignore = []

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io and this repository itself.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
