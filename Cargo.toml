# Package
[package]
name = "suon"
version.workspace = true
edition.workspace = true
repository.workspace = true

[dependencies]
bevy.workspace = true
suon_network.workspace = true

# Workspace
[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0-dev"
edition = "2024"
license = "MIT"
authors = ["Ramon Bernardo <ramonbernardo.contato@gmail.com>"]
repository = "https://github.com/suonengine/suon"

[workspace.lints.rust]
unsafe_op_in_unsafe_fn = "deny"
unused_lifetimes = "warn"
unused_attributes = "warn"

[workspace.dependencies]
anyhow = { version = "1.0", default-features = false }
bevy = { version = "0.18", default-features = false, features = [
  "multi_threaded",
  "sysinfo_plugin",
  "bevy_log",
  "async_executor",
] }
bytes = { version = "1.10", default-features = false }
criterion = "0.8.2"
crossbeam-channel = { version = "0.5", default-features = false }
enumflags2 = { version = "0.7", default-features = false }
humantime = { version = "2.3", default-features = false }
proc-macro2 = { version = "1.0", default-features = false }
quote = { version = "1.0", default-features = false }
serde = { version = "1.0", default-features = false }
serde_derive = { version = "1.0", default-features = false }
mlua = { version = "0.11", default-features = false }
serde_json = { version = "1.0", default-features = false }
smol = { version = "2.0", default-features = false }
smol-timeout = { version = "0.6", default-features = false }
syn = { version = "2.0", default-features = false }
thiserror = { version = "2.0", default-features = false }
tokio = { version = "1.52", default-features = false }
toml = { version = "1.1", default-features = false }

suon_checksum = { path = "crates/suon_checksum" }
suon_database = { path = "crates/suon_database" }
suon_macros = { path = "crates/suon_macros" }
suon_movement = { path = "crates/suon_movement" }
suon_network = { path = "crates/suon_network" }
suon_protocol = { path = "crates/suon_protocol" }
suon_serde = { path = "crates/suon_serde" }
suon_task = { path = "crates/suon_task" }
suon_chunk = { path = "crates/suon_chunk" }
suon_position = { path = "crates/suon_position" }
suon_xtea = { path = "crates/suon_xtea" }
suon_lua = { path = "crates/suon_lua" }

[profile.dev]
# Use a small amount of optimization to keep compile times fast during development
opt-level = 1

[profile.dev.package."*"]
# Use maximum optimization to improve dependency performance
opt-level = 3

# Release profile: increase optimization at the cost of longer compile times
[profile.release]
# Use maximum optimization to improve dependency performance
opt-level = 3

# Compile the entire crate as a single unit for better optimization
# This may slow down compilation slightly but can improve performance
codegen-units = 1

# Enable Thin LTO (Link Time Optimization) for a second optimization pass
# Improves runtime performance across the crate and dependencies
lto = "fat"

# Immediately terminate on panic to reduce binary size and overhead
# Removes the need for stack unwinding code
panic = "abort"

# Strip symbols and debug information from the binary
# Significantly reduces the final file size for distribution
strip = true

debug = false

incremental = false
