name: Miri UB

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  miri:
    name: Running miri
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Restore cargo registry and git cache
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore workspace target cache
        uses: actions/cache@v4.3.0
        with:
          path: target
          key: ${{ runner.os }}-miri-target-${{ hashFiles('**/Cargo.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-target-

      - name: Setup miri
        run: cargo miri setup

      - name: Run miri
        run: cargo miri test --workspace --all-features --doc
