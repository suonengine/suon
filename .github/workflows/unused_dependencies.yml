name: Unused dependencies

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  udeps:
    name: Running udeps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: baptiste0928/cargo-install@v3.4.0
        with:
          crate: cargo-udeps

      - name: Restore cargo registry and git cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Restore workspace target cache
        uses: actions/cache@v5.0.5
        with:
          path: target
          key: ${{ runner.os }}-udeps-target-${{ hashFiles('**/Cargo.toml') }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-udeps-target-

      - name: Run udeps
        run: rustup run nightly cargo udeps --workspace --all-features --all-targets
