name: Toml

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  toml:
    name: Running taplo fmt
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install taplo
        uses: taiki-e/install-action@v2.75.18
        with:
          tool: taplo-cli

      - name: Run taplo
        id: taplo
        run: taplo fmt --check --diff

      - name: Taplo info
        if: failure()
        run: |
          echo 'To format TOML files, run: `taplo fmt`'
          echo 'To check for formatting differences, run: `taplo fmt --check --diff`'
